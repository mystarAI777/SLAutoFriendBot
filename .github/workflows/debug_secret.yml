name: 🔬 Secret確認デバッグ

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Secret有無チェック
        env:
          URL: ${{ secrets.RENDER_APP_URL }}
          KEY: ${{ secrets.WAKE_API_KEY }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔬 GitHub Secrets 設定状態チェック"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📏 RENDER_APP_URL の長さ: ${#URL} 文字"
          echo "📏 WAKE_API_KEY の長さ: ${#KEY} 文字"
          echo ""

          if [ -z "$URL" ]; then
            echo "❌ RENDER_APP_URL が空です"
          else
            echo "✅ RENDER_APP_URL 設定済み"
            echo "   先頭5文字の長さチェック: $(echo -n "$URL" | head -c 5 | wc -c)"
            echo "   https で始まるか: $(echo "$URL" | grep -c "^https")"
          fi

          echo ""

          if [ -z "$KEY" ]; then
            echo "❌ WAKE_API_KEY が空です"
          else
            echo "✅ WAKE_API_KEY 設定済み"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "期待する値:"
          echo "  RENDER_APP_URL = 37文字 (https://slautofriendbot.onrender.com)"
          echo "  WAKE_API_KEY  = 44文字 (mochiko-wake-...)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
