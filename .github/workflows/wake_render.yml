name: 🌅 Render 省エネ起動 & 情報収集

# ==============================================================================
# 【設計思想】
#
#   Render無料枠 (750時間/月) を節約するため、
#   「必要な時だけ起こして仕事させ、終わったらスリープに戻す」設計。
#
# 【動作の流れ】(v33.20.4 - タスク完了ポーリング版)
#
#   GitHub Actions (cron)
#       ↓ 定刻になったら
#   POST /wake  ← Renderを叩き起こす
#       ↓ Renderが起動 → catch_up_all_tasks() がBG実行開始
#   ★ ポーリングループ（最大6分）
#       ↓ 30秒間隔で /admin/tasks_status_compact を叩く
#       ↓ 期限切れタスクが0になったら終了
#   レポート出力
#       ↓
#   Render は自然にスリープ
#
# 【旧版からの主な変更点（v33.20.4）】
#
#   旧: sleep 30 で30秒固定待ち → 重いタスクは間に合わずRenderスリープでkill
#   新: タスク完了までポーリング → 確実に全タスク完了
#
# 【セットアップ方法】
#
#   GitHub リポジトリの Settings → Secrets and variables → Actions に追加:
#
#     RENDER_APP_URL  : https://あなたの.onrender.com  (末尾スラッシュなし)
#     WAKE_API_KEY    : mochiko-wake-2024-適当な文字
#
# ==============================================================================

on:
  schedule:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 1日3回起こす (JST表記、cronはUTCで指定)
    # UTC = JST - 9時間
    #
    # 重要: GitHub Actions の cron は5〜30分遅延することがあるので、
    #       昼/深夜タスクの実行窓を15時台/3時台 (1時間) で取っているのは正解。
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - cron: '0 23 * * *'   # JST  8:00 朝 (UTC 前日23時)
    - cron: '0 6  * * *'   # JST 15:00 夕 (UTC 6時)  ← noonタスク実行
    - cron: '0 18 * * *'   # JST 3:00 深夜 (UTC 18時) ← midnightタスク実行

  # Actionsタブから手動実行
  workflow_dispatch:
    inputs:
      task:
        description: '実行タスク名 (空欄=全タスク自動判定)'
        required: false
        default: ''

jobs:
  wake-and-collect:
    name: 🔔 起こして収集
    runs-on: ubuntu-latest
    timeout-minutes: 8  # ポーリング最大6分 + 余裕

    steps:
      # ─────────────────────────────────────────────
      # Step 1: /wake を叩いてRenderを起動
      # ─────────────────────────────────────────────
      - name: 🌅 Renderを起こす
        id: wake
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          WAKE_API_KEY:   ${{ secrets.WAKE_API_KEY }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📡 接続先: $RENDER_APP_URL"
          echo "🕐 UTC時刻: $(date -u '+%Y-%m-%d %H:%M')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          HTTP_CODE=$(curl -s -o /tmp/wake_response.json \
            -w "%{http_code}" \
            --max-time 40 \
            --retry 2 \
            --retry-delay 10 \
            -X POST \
            -H "X-Wake-Token: $WAKE_API_KEY" \
            -H "X-Caller: github-actions/$(date -u '+%H:%M')" \
            -H "Content-Type: application/json" \
            "$RENDER_APP_URL/wake")

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Render起動成功"
          elif [ "$HTTP_CODE" = "401" ]; then
            echo "❌ 認証失敗 — GitHub Secrets の WAKE_API_KEY を確認してください"
            exit 1
          else
            echo "⚠️  HTTP $HTTP_CODE — Renderがまだ起動中の可能性あり、続行します"
          fi

      # ─────────────────────────────────────────────
      # Step 2: ★ v33.20.4 タスク完了をポーリングで待つ
      #
      # 設計:
      #   - 30秒間隔で /admin/tasks_status_compact を叩く
      #   - 期限切れタスクが 0 になったら終了
      #   - 最大12回 (= 6分) 待つ
      #   - その間Renderは生きている（curlリクエストが続くため）
      # ─────────────────────────────────────────────
      - name: ⏳ タスク完了ポーリング (最大6分)
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          WAKE_API_KEY:   ${{ secrets.WAKE_API_KEY }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⏳ タスク完了をポーリング中 (30秒間隔、最大12回)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          MAX_ATTEMPTS=12
          POLL_INTERVAL=30
          ALL_DONE=0

          for i in $(seq 1 $MAX_ATTEMPTS); do
            sleep $POLL_INTERVAL
            
            HTTP_CODE=$(curl -s -o /tmp/poll_response.json \
              -w "%{http_code}" \
              --max-time 15 \
              -H "X-Wake-Token: $WAKE_API_KEY" \
              "$RENDER_APP_URL/admin/tasks_status_compact" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              # JSONからoverdue_countを取得
              OVERDUE=$(python3 -c "import json,sys; d=json.load(open('/tmp/poll_response.json')); print(d.get('overdue_count',-1))" 2>/dev/null || echo "-1")
              READY=$(python3 -c "import json,sys; d=json.load(open('/tmp/poll_response.json')); print('yes' if d.get('ready_to_sleep') else 'no')" 2>/dev/null || echo "no")
              OVERDUE_LIST=$(python3 -c "import json,sys; d=json.load(open('/tmp/poll_response.json')); print(', '.join(d.get('overdue_tasks',[])))" 2>/dev/null || echo "?")

              echo "[$i/$MAX_ATTEMPTS] 期限切れ残: $OVERDUE 件"
              if [ -n "$OVERDUE_LIST" ] && [ "$OVERDUE_LIST" != "?" ]; then
                echo "         → $OVERDUE_LIST"
              fi

              if [ "$READY" = "yes" ]; then
                echo "✅ 全タスク完了！"
                ALL_DONE=1
                break
              fi
            else
              echo "[$i/$MAX_ATTEMPTS] HTTP $HTTP_CODE - 一時的な失敗、続行"
            fi
          done

          if [ "$ALL_DONE" = "1" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🎉 全タスク完了でループ終了"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⏰ 6分経過 - まだ完了していないタスクがあります"
            echo "   (次のwakeで残りが実行されます)"
          fi

      # ─────────────────────────────────────────────
      # Step 3: (手動実行時のみ) 特定タスクを指定実行
      # ─────────────────────────────────────────────
      - name: 🎯 指定タスク実行 (手動時のみ)
        if: ${{ github.event.inputs.task != '' }}
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          WAKE_API_KEY:   ${{ secrets.WAKE_API_KEY }}
          TASK_NAME:      ${{ github.event.inputs.task }}
        run: |
          echo "🎯 タスク手動実行: $TASK_NAME"
          HTTP_CODE=$(curl -s -o /tmp/task_response.json \
            -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "X-Wake-Token: $WAKE_API_KEY" \
            "$RENDER_APP_URL/admin/tasks/$TASK_NAME/run")

          cat /tmp/task_response.json
          [ "$HTTP_CODE" = "200" ] && echo "✅ タスク開始" || { echo "❌ 失敗 (HTTP $HTTP_CODE)"; exit 1; }

      # ─────────────────────────────────────────────
      # Step 4: 最終ステータス確認 & ログ出力
      # ─────────────────────────────────────────────
      - name: 📊 実行結果レポート
        if: always()
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          WAKE_API_KEY:   ${{ secrets.WAKE_API_KEY }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 最終ステータス確認"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          HTTP_CODE=$(curl -s -o /tmp/tasks_status.json \
            -w "%{http_code}" \
            --max-time 10 \
            -H "X-Wake-Token: $WAKE_API_KEY" \
            "$RENDER_APP_URL/admin/tasks")

          if [ "$HTTP_CODE" = "200" ]; then
            python3 - << 'PYEOF'
          import json
          try:
              with open('/tmp/tasks_status.json') as f:
                  d = json.load(f)
              print(f"総タスク: {d['total_tasks']}件 / 期限切れ残: {d['overdue_tasks']}件")
              print()
              print(f"{'タスク名':<30} {'最終成功':<22} {'回数':>5} {'状態'}")
              print("-" * 75)
              for t in d['tasks']:
                  state = "⏰ 期限切れ" if t['overdue'] else "✅"
                  err   = f"  ⚠ {t['last_error'][:50]}" if t.get('last_error') else ""
                  print(f"{t['task']:<30} {t['last_success']:<22} {t['run_count']:>5}  {state}{err}")
          except Exception as e:
              print(f"解析エラー: {e}")
          PYEOF
          else
            echo "⚠️  ステータス取得失敗 (HTTP $HTTP_CODE)"
          fi

          # /health/detail で最終確認
          curl -s --max-time 8 "$RENDER_APP_URL/health/detail" 2>/dev/null > /tmp/health.json || echo '{}' > /tmp/health.json
          python3 - << 'PYEOF'
          import json
          try:
              d = json.load(open('/tmp/health.json'))
              print()
              print(f"バージョン: {d.get('version','?')}")
              print(f"Gemini: {'✅' if d.get('gemini') else '❌'} ({d.get('gemini_model','?')})")
              print(f"Groq: {'✅' if d.get('groq') else '❌'} / ホロメン: {d.get('holomem_count',0)}名")
          except Exception as e:
              pass
          PYEOF

          echo ""
          echo "🏁 完了 — Renderはこれからスリープに入ります"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
